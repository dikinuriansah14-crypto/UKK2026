<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Formulir Laporan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Pengaduan Sekolah</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link active" href="submission.html">Lapor</a></li>
                    <li class="nav-item"><a class="nav-link" href="tracking.html">Lacak</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="text-center mb-4">Formulir Laporan</h1>
        <div class="progress mb-4">
            <div class="progress-bar" id="progress-bar" style="width: 33%"></div>
        </div>
        <form id="report-form">
            <!-- Step 1: Klasifikasi -->
            <div class="step active" id="step1">
                <h3>Klasifikasi Laporan</h3>
                <div class="mb-3">
                    <label for="category" class="form-label">Kategori</label>
                    <select class="form-select" id="category" required>
                        <option value="">Pilih Kategori</option>
                        <option value="fasilitas">Fasilitas</option>
                        <option value="guru">Guru</option>
                        <option value="bullying">Bullying</option>
                        <option value="kurikulum">Saran Kurikulum</option>
                    </select>
                </div>
                <button type="button" class="btn btn-primary" onclick="nextStep(1)">Selanjutnya</button>
            </div>

            <!-- Step 2: Detail -->
            <div class="step" id="step2">
                <h3>Detail Laporan</h3>
                <div class="mb-3">
                    <label for="title" class="form-label">Judul Laporan</label>
                    <input type="text" class="form-control" id="title" required>
                </div>
                <div class="mb-3">
                    <label for="date" class="form-label">Tanggal Kejadian</label>
                    <input type="date" class="form-control" id="date" required>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Deskripsi Kronologi</label>
                    <textarea class="form-control" id="description" rows="4" required></textarea>
                </div>
                <button type="button" class="btn btn-secondary" onclick="prevStep(2)">Sebelumnya</button>
                <button type="button" class="btn btn-primary" onclick="nextStep(2)">Selanjutnya</button>
            </div>

            <!-- Step 3: Lampiran -->
            <div class="step" id="step3">
                <h3>Lampiran</h3>
                <div class="mb-3">
                    <label class="form-label">Upload File (Foto/Video/Dokumen)</label>
                    <div class="drop-zone" id="drop-zone">
                        <p>Drag & drop files here or click to select</p>
                        <input type="file" id="file-input" multiple>
                    </div>
                    <div id="file-list"></div>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="anonymous">
                    <label class="form-check-label" for="anonymous">
                        Laporkan sebagai Anonim
                    </label>
                </div>
                <div id="recaptcha" class="mb-3">
                    <!-- reCAPTCHA placeholder -->
                    <p>reCAPTCHA v3 akan dimuat di sini</p>
                </div>
                <button type="button" class="btn btn-secondary" onclick="prevStep(3)">Sebelumnya</button>
                <button type="submit" class="btn btn-success" id="submit-btn">Kirim Laporan</button>
            </div>
        </form>
        <div id="loader" class="text-center mt-3" style="display: none;">
            <div class="spinner-border" role="status">
                <span class="sr-only">Loading...</span>
            </div>
            <p>Mengirim laporan...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/submission.js"></script>
</body>
</html>
